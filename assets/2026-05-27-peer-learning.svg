<svg width="1080" height="1080" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="bg" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#162040"/>
      <stop offset="100%" stop-color="#080e1f"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c9a84c" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#c9a84c" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg)"/>

  <!-- Center glow -->
  <circle cx="540" cy="430" r="270" fill="url(#glow)"/>

  <!-- Dashed lines: table edge to node edge -->
  <!-- Top (Manufacturing) -->
  <line x1="540" y1="315" x2="540" y2="260" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Top-right (Technology) -->
  <line x1="640" y1="372" x2="687" y2="345" stroke="#4d8fd4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Bottom-right (Finance) -->
  <line x1="640" y1="488" x2="687" y2="515" stroke="#4d8fd4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Bottom (Creative) -->
  <line x1="540" y1="545" x2="540" y2="600" stroke="#c9a84c" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Bottom-left (Healthcare) -->
  <line x1="440" y1="488" x2="393" y2="515" stroke="#4d8fd4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>
  <!-- Top-left (Retail) -->
  <line x1="440" y1="372" x2="393" y2="345" stroke="#4d8fd4" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5"/>

  <!-- Table -->
  <circle cx="540" cy="430" r="115" fill="#0c1428" stroke="#c9a84c" stroke-width="2.5"/>
  <circle cx="540" cy="430" r="75" fill="none" stroke="#c9a84c" stroke-width="0.8" opacity="0.3"/>
  <circle cx="540" cy="430" r="6" fill="#c9a84c"/>

  <!-- NODE: Manufacturing (top) -->
  <circle cx="540" cy="205" r="55" fill="#0c1428" stroke="#c9a84c" stroke-width="2"/>
  <g transform="translate(540,205)" fill="#c9a84c">
    <circle r="12" fill="none" stroke="#c9a84c" stroke-width="1.8"/>
    <circle r="5" fill="#c9a84c"/>
    <rect x="-4" y="-22" width="8" height="10" rx="2"/>
    <rect x="-4" y="12" width="8" height="10" rx="2"/>
    <rect x="-22" y="-4" width="10" height="8" rx="2"/>
    <rect x="12" y="-4" width="10" height="8" rx="2"/>
    <rect x="-17" y="-20" width="8" height="8" rx="2" transform="rotate(-45 -13 -16)"/>
    <rect x="9" y="-20" width="8" height="8" rx="2" transform="rotate(45 13 -16)"/>
    <rect x="-17" y="12" width="8" height="8" rx="2" transform="rotate(45 -13 16)"/>
    <rect x="9" y="12" width="8" height="8" rx="2" transform="rotate(-45 13 16)"/>
  </g>
  <text x="540" y="278" text-anchor="middle" fill="#6a7f9a" font-size="13" font-family="Arial, sans-serif" letter-spacing="2.5" font-weight="700">MANUFACTURING</text>

  <!-- NODE: Technology (top-right) -->
  <circle cx="735" cy="317" r="55" fill="#0c1428" stroke="#4d8fd4" stroke-width="2"/>
  <g transform="translate(735,317)" stroke="#4d8fd4" stroke-width="2" fill="none" stroke-linecap="round">
    <rect x="-13" y="-13" width="26" height="26" rx="3"/>
    <rect x="-7" y="-7" width="14" height="14" rx="1" fill="#4d8fd4" fill-opacity="0.15"/>
    <line x1="-13" y1="-5" x2="-20" y2="-5"/>
    <line x1="-13" y1="5" x2="-20" y2="5"/>
    <line x1="13" y1="-5" x2="20" y2="-5"/>
    <line x1="13" y1="5" x2="20" y2="5"/>
    <line x1="-5" y1="-13" x2="-5" y2="-20"/>
    <line x1="5" y1="-13" x2="5" y2="-20"/>
    <line x1="-5" y1="13" x2="-5" y2="20"/>
    <line x1="5" y1="13" x2="5" y2="20"/>
  </g>
  <text x="735" y="390" text-anchor="middle" fill="#6a7f9a" font-size="13" font-family="Arial, sans-serif" letter-spacing="2.5" font-weight="700">TECHNOLOGY</text>

  <!-- NODE: Finance (bottom-right) -->
  <circle cx="735" cy="543" r="55" fill="#0c1428" stroke="#4d8fd4" stroke-width="2"/>
  <g transform="translate(735,543)" fill="#4d8fd4">
    <rect x="-19" y="2" width="10" height="14" rx="1"/>
    <rect x="-5" y="-10" width="10" height="26" rx="1"/>
    <rect x="9" y="-3" width="10" height="19" rx="1"/>
    <rect x="-21" y="15" width="44" height="2" rx="1" opacity="0.4"/>
  </g>
  <text x="735" y="616" text-anchor="middle" fill="#6a7f9a" font-size="13" font-family="Arial, sans-serif" letter-spacing="2.5" font-weight="700">FINANCE</text>

  <!-- NODE: Creative (bottom) -->
  <circle cx="540" cy="655" r="55" fill="#0c1428" stroke="#c9a84c" stroke-width="2"/>
  <g transform="translate(540,655)" fill="#c9a84c">
    <polygon points="0,-22 5.5,-5.5 22,0 5.5,5.5 0,22 -5.5,5.5 -22,0 -5.5,-5.5"/>
    <circle r="7" fill="#0c1428"/>
    <circle r="3.5" fill="#c9a84c"/>
  </g>
  <text x="540" y="728" text-anchor="middle" fill="#6a7f9a" font-size="13" font-family="Arial, sans-serif" letter-spacing="2.5" font-weight="700">CREATIVE</text>

  <!-- NODE: Healthcare (bottom-left) -->
  <circle cx="345" cy="543" r="55" fill="#0c1428" stroke="#4d8fd4" stroke-width="2"/>
  <g transform="translate(345,543)" fill="#4d8fd4">
    <rect x="-5" y="-20" width="10" height="40" rx="2"/>
    <rect x="-20" y="-5" width="40" height="10" rx="2"/>
  </g>
  <text x="345" y="616" text-anchor="middle" fill="#6a7f9a" font-size="13" font-family="Arial, sans-serif" letter-spacing="2.5" font-weight="700">HEALTHCARE</text>

  <!-- NODE: Retail (top-left) -->
  <circle cx="345" cy="317" r="55" fill="#0c1428" stroke="#4d8fd4" stroke-width="2"/>
  <g transform="translate(345,317)" stroke="#4d8fd4" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-14,4 L-10,-12 Q-10,-22 0,-22 Q10,-22 10,-12 L14,4 Q15,16 0,16 Q-15,16 -14,4 Z"/>
    <path d="M-6,-12 Q-6,-17 0,-17 Q6,-17 6,-12"/>
  </g>
  <text x="345" y="390" text-anchor="middle" fill="#6a7f9a" font-size="13" font-family="Arial, sans-serif" letter-spacing="2.5" font-weight="700">RETAIL</text>

  <!-- Table label -->
  <text x="540" y="424" text-anchor="middle" fill="#c9a84c" font-size="11" font-family="Arial, sans-serif" letter-spacing="2" opacity="0.8">PEER</text>
  <text x="540" y="441" text-anchor="middle" fill="#c9a84c" font-size="11" font-family="Arial, sans-serif" letter-spacing="2" opacity="0.8">ROUND</text>
  <text x="540" y="458" text-anchor="middle" fill="#c9a84c" font-size="11" font-family="Arial, sans-serif" letter-spacing="2" opacity="0.8">TABLE</text>

  <!-- Divider above quote -->
  <line x1="200" y1="778" x2="880" y2="778" stroke="#c9a84c" stroke-width="0.6" opacity="0.25"/>

  <!-- Quote -->
  <text x="540" y="828" text-anchor="middle" fill="#dde4ef" font-size="28" font-family="Georgia, serif" font-style="italic">"The best thinking comes from</text>
  <text x="540" y="870" text-anchor="middle" fill="#dde4ef" font-size="28" font-family="Georgia, serif" font-style="italic">outside your industry."</text>

  <!-- Bottom divider -->
  <line x1="380" y1="910" x2="700" y2="910" stroke="#c9a84c" stroke-width="0.8" opacity="0.4"/>

  <!-- Branding -->
  <text x="540" y="942" text-anchor="middle" fill="#3d526e" font-size="13" font-family="Arial, sans-serif" letter-spacing="3" font-weight="600">CORPORATE CONNECTIONS AP &amp; TS</text>
</svg>
